{% extends "base.html" %}

{% block content %}

<div class="container p-5">

<h1>Contact Us</h1>

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label>Name</label>

<input type="text" name="name" class="form-control">

</div>

<div class="mb-3">

<label>Email</label>

<input type="email" name="email" class="form-control">

</div>

<div class="mb-3">

<label>Message</label>

<textarea name="message" class="form-control"></textarea>

</div>

<button class="btn btn-primary">

Send Message

</button>

</form>

</div>

{% endblock %}
